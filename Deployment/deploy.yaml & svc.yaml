apiVersion: apps/v1
kind: Deployment
metadata:
  name: super-mario
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gaming-app
  template:
    metadata:
      name: tmp1
      labels:
        app: gaming-app
    spec:
      containers:
        - name: super-mario
          image: abhinagare/abhi-new-repo:v2
          ports:
            - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: super-mario-svc
spec:
  selector:
    app: gaming-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort
