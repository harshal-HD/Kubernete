apiVersion: v1
kind: ReplicationController
metadata:
  name: rc-coffee
spec:
  replicas: 3
  selector:
    env: dev
  template:
    metadata:
      name: tmp-coffee
      labels:
        env: dev
    spec:
      containers:
        - name: c1
          image: nginx
          ports:
            - containerPort: 80 
---
apiVersion: v1
kind: Service
metadata:
  name: coffee-svc
spec:
  selector:
    env: dev
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
